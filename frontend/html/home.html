<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Attendance System</title>
  <link rel="stylesheet" href="../css/home.css">
</head>
<body>

  <div class="home-container">
    <div class="home-header">
      <div class="logo">📋</div>
      <h1>Smart Attendance</h1>
      <p>Select your role to continue</p>
    </div>

    <div class="role-cards">
      <div class="role-card" onclick="window.location.href='admin-login.html'">
        <div class="role-icon">🛡️</div>
        <h3>Admin</h3>
        <p>Manage teachers, students & classes</p>
      </div>

      <div class="role-card" onclick="window.location.href='teacher-login.html'">
        <div class="role-icon">👨‍🏫</div>
        <h3>Teacher</h3>
        <p>Start sessions & track attendance</p>
      </div>

      <div class="role-card" onclick="window.location.href='student-login.html'">
        <div class="role-icon">👨‍🎓</div>
        <h3>Student</h3>
        <p>Mark attendance & view records</p>
      </div>
    </div>
  </div>

</body>
</html>
