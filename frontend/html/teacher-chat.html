<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Chat</title>

  <script>
    (function() {
      const token = localStorage.getItem("token");
      const role = localStorage.getItem("role");
      if (!token || role !== "teacher") {
        window.location.replace("teacher-login.html");
      }
    })();
  </script>

  <link rel="stylesheet" href="../css/chat.css">
  <link rel="stylesheet" href="../components/topbar.css">
  <link rel="stylesheet" href="../components/sidebar.css">
</head>
<body>

  <div id="topbar-container"></div>

  <div class="main">
    <div id="sidebar-container"></div>

    <div id="mainContent" class="content">

      <!-- Announcement Section -->
      <div class="chat-container">
        <h2>📢 Announcements & Chat</h2>

        <!-- New Announcement -->
        <div class="announcement-box">
          <h3>New Announcement</h3>
          <textarea id="announcementText" placeholder="Write announcement here..."></textarea>
          <button id="sendAnnouncement">📢 Send Announcement</button>
        </div>

        <!-- Announcements List -->
        <div id="announcementsList"></div>

      </div>

    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../components/topbar.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../js/teacher-chat.js"></script>
</body>
</html>
