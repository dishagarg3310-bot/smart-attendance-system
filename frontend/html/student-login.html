<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login</title>
  <link rel="stylesheet" href="../css/teacher-login.css">
  <link rel="stylesheet" href="../css/student-login.css">
</head>
<body>

  <div class="login-container">

    <a href="home.html" class="back-btn">← Back</a>

    <div class="login-header">
      <div class="login-icon">👨‍🎓</div>
      <h2>Student Portal</h2>
      <p>Login or create your account</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- Login Form -->
    <div class="form-section active" id="loginSection">
      <form id="studentLoginForm">
        <input type="email" id="email" placeholder="Email" required />

        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Password" required />
          <span class="show-pass" onclick="toggleLoginPassword()">👁️</span>
        </div>

        <div class="remember-me">
          <input type="checkbox" id="rememberMe" />
          <label for="rememberMe">Remember Me</label>
        </div>

        <button type="submit">Login</button>
      </form>
      <p id="errorMsg" style="color:red; text-align:center;"></p>
    </div>

    <!-- Sign Up Form -->
    <div class="form-section" id="signupSection">
      <form id="studentSignupForm">
        <input type="text" id="signupName" placeholder="Full Name" required />
        <input type="email" id="signupEmail" placeholder="Email" required />

        <div class="password-wrapper">
          <input type="password" id="signupPassword" placeholder="Password" required />
          <span class="show-pass" onclick="toggleSignupPassword()">👁️</span>
        </div>

        <select id="signupClass">
          <option value="">Select Class</option>
        </select>

        <button type="submit">Sign Up</button>
      </form>
      <p id="signupMsg" style="text-align:center;"></p>
    </div>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/student-login.js"></script>
</body>
</html>
