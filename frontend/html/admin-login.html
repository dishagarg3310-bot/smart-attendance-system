<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="../css/admin-login.css">
</head>
<body>

  <div class="login-container">

    <a href="../index.html" class="back-btn">← Back</a>

    <div class="login-header">
      <div class="login-icon">🛡️</div>
      <h2>Admin Login</h2>
      <p>Access admin dashboard</p>
    </div>

    <form id="adminLoginForm">
      <input type="email" id="email" placeholder="Admin Email" required />

      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" required />
        <span class="show-pass" onclick="togglePassword()">👁️</span>
      </div>

      <div class="remember-me">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Remember Me</label>
      </div>

      <div class="hint-box">
        <span class="hint-toggle" onclick="toggleHint()">🔍 Demo Credentials</span>
        <div class="hint-content" id="hintContent" style="display:none;">
          <p><strong>Email:</strong> admin7796@gmail.com</p>
          <p><strong>Password:</strong> Admin@123</p>
        </div>
      </div>

      <button type="submit">Login</button>
    </form>

    <p id="errorMsg"></p>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/admin-login.js"></script>
</body>
</html>
