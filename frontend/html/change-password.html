<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>

  <script>
    (function() {
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.replace("login.html");
      }
    })();
  </script>

  <link rel="stylesheet" href="../css/change-password.css">
  <link rel="stylesheet" href="../components/topbar.css">
  <link rel="stylesheet" href="../components/sidebar.css">
</head>
<body>

  <div id="topbar-container"></div>

  <div class="main">
    <div id="sidebar-container"></div>

    <div id="mainContent" class="content">
      <div class="password-card">

        <h2>🔒 Change Password</h2>

        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="currentPassword" placeholder="Current password daalo">
        </div>

        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Naya password daalo">
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Naya password confirm karo">
        </div>

        <p id="errorMsg" class="error-msg"></p>
        <p id="successMsg" class="success-msg"></p>

        <button id="changeBtn">Update Password</button>

      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../components/topbar.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../js/change-password.js"></script>

</body>
</html>
