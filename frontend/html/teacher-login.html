<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Login</title>
  <link rel="stylesheet" href="../css/teacher-login.css">
  <link rel="stylesheet" href="../css/teacher-login-demo.css">
</head>
<body>

  <div class="login-container">

    <a href="../index.html" class="back-btn">← Back</a>

    <h2>Teacher Login</h2>

    <div class="demo-box">
      <p class="demo-title">🎯 Demo Credentials</p>
      <p><strong>Email:</strong> priya@gmail.com</p>
      <p><strong>Password:</strong> priya123</p>
      <button type="button" class="fill-demo" onclick="fillDemo()">Use Demo Account</button>
    </div>

    <form id="teacherLoginForm">
      <input type="email" id="email" placeholder="Email" required />

      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" required />
        <span class="show-pass" onclick="togglePassword()">👁️</span>
      </div>

      <div class="remember-me">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Remember Me</label>
      </div>

      <button type="submit">Login</button>
    </form>

    <p id="errorMsg"></p>
  </div>

  <script src="../js/config.js" defer></script>
  <script src="../js/teacher-login.js" defer></script>
</body>
</html>
