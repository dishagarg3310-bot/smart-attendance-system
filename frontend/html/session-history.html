<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session History</title>

  <script>
    (function() {
      const token = localStorage.getItem("token");
      const role = localStorage.getItem("role");
      if (!token || role !== "teacher") {
        window.location.replace("login.html");
      }
    })();
  </script>

  <link rel="stylesheet" href="../css/session-history.css">
  <link rel="stylesheet" href="../components/topbar.css">
  <link rel="stylesheet" href="../components/sidebar.css">
</head>
<body>

  <div id="topbar-container"></div>

  <div class="main">
    <div id="sidebar-container"></div>

    <div id="mainContent" class="content">
      <section>

        <div class="dashboard-header">
          <h2>📋 Session History</h2>
          <p class="subtitle">Saari conducted classes ka record</p>
        </div>

        <!-- Summary Cards -->
        <div class="cards">
          <div class="card">
            <p>Total Sessions</p>
            <h3 id="totalSessions">0</h3>
          </div>
          <div class="card">
            <p>Total Present</p>
            <h3 id="totalPresent">0</h3>
          </div>
          <div class="card">
            <p>Total Absent</p>
            <h3 id="totalAbsent">0</h3>
          </div>
          <div class="card">
            <p>This Month</p>
            <h3 id="thisMonth">0</h3>
          </div>
        </div>

        <!-- Month Filter -->
        <div id="monthFilter" class="month-filter"></div>

        <!-- Sessions List -->
        <div id="sessionList">
          <p class="empty-msg">Loading...</p>
        </div>

      </section>
    </div>
  </div>

  <script src="../components/topbar.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/session-history.js"></script>

</body>
</html>
